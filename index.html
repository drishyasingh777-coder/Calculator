```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
    padding:20px;
}

.calculator{
    width:100%;
    max-width:380px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:20px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.display{
    width:100%;
    height:90px;
    border:none;
    outline:none;
    background:#1f2937;
    color:white;
    text-align:right;
    padding:20px;
    font-size:2rem;
    border-radius:15px;
    margin-bottom:20px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    border:none;
    height:70px;
    border-radius:15px;
    font-size:1.3rem;
    cursor:pointer;
    transition:0.2s ease;
    color:white;
}

button:hover{
    transform:translateY(-2px);
}

.number{
    background:#374151;
}

.operator{
    background:#ff8c42;
}

.equal{
    background:#4cc9f0;
}

.clear{
    background:#ff4d6d;
}

@media(max-width:480px){
    .display{
        height:80px;
        font-size:1.8rem;
    }

    button{
        height:60px;
        font-size:1.1rem;
    }
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="number" onclick="appendValue('.')">.</button>

        <button class="number" style="grid-column: span 2;" onclick="appendValue('0')">0</button>
        <button class="number" onclick="backspace()">⌫</button>
        <button class="number" onclick="appendValue('%')">%</button>
    </div>
</div>

<script>
const display = document.getElementById("display");

function appendValue(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function backspace(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

document.addEventListener("keydown",(e)=>{
    if(!isNaN(e.key) || "+-*/.%".includes(e.key)){
        appendValue(e.key);
    }
    else if(e.key==="Enter"){
        calculate();
    }
    else if(e.key==="Backspace"){
        backspace();
    }
    else if(e.key==="Escape"){
        clearDisplay();
    }
});
</script>

</body>
</html>
